<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>外链提交助手</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="app-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
      </div>
      <span class="app-title">外链提交助手</span>
    </header>

    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="fill">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
        智能填充
      </button>
      <button class="tab-btn" data-tab="sites">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        网站管理
      </button>
      <button class="tab-btn" data-tab="settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 19.07a10 10 0 010-14.14"/></svg>
        设置
      </button>
    </nav>

    <!-- 智能填充 Tab -->
    <div class="tab-panel active" id="tab-fill">
      <div id="pageInfo" class="page-info" style="display:none">
        <div class="page-info-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </div>
        <div>
          <div class="page-domain" id="pageDomain"></div>
          <div class="page-stat" id="pageStat"></div>
        </div>
      </div>

      <div class="fill-section-label">选择网站配置</div>
      <select id="fillSiteSelect" class="form-input form-select fill-site-select">
        <option value="">-- 请选择网站 --</option>
      </select>

      <div class="fill-actions" id="fillActions" style="display:none">
        <button class="btn btn-primary btn-fill" id="doFillBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
          检测并填充
        </button>
      </div>

      <div class="fill-section-label" id="matchListLabel" style="display:none">字段匹配结果</div>
      <div id="matchList" class="match-list"></div>

      <div id="fillEmpty" class="empty-state" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
        <p id="fillEmptyMsg">请选择网站后，点击“检测并填充”</p>
      </div>
    </div>

    <!-- 添加/编辑网站表单（覆盖层） -->
    <div class="form-overlay" id="siteFormOverlay" style="display:none">
      <div class="form-header">
        <h2 id="formTitle">添加网站</h2>
        <button class="icon-btn" id="closeFormBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="form-body">
        <input type="hidden" id="siteId">

        <div class="form-group">
          <label class="form-label">Name <span class="required">*</span></label>
          <input type="text" id="f-name" class="form-input" placeholder="产品/网站名称">
        </div>
        <div class="form-group">
          <label class="form-label">URL <span class="required">*</span></label>
          <input type="url" id="f-url" class="form-input" placeholder="https://example.com">
        </div>
        <div class="form-group">
          <label class="form-label">Product Email</label>
          <input type="email" id="f-email" class="form-input" placeholder="contact@example.com">
        </div>
        <div class="form-group">
          <label class="form-label">Your Name</label>
          <input type="text" id="f-yourName" class="form-input" placeholder="你的姓名">
        </div>
        <div class="form-group">
          <label class="form-label">Your Email</label>
          <input type="email" id="f-yourEmail" class="form-input" placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label class="form-label">Blog URL</label>
          <input type="url" id="f-blogUrl" class="form-input" placeholder="https://example.com/blog">
        </div>
        <div class="form-group">
          <label class="form-label">Icon URL</label>
          <input type="url" id="f-icon" class="form-input" placeholder="https://example.com/icon.png">
        </div>
        <div class="form-group">
          <label class="form-label">Screenshot URL</label>
          <input type="url" id="f-screenshot" class="form-input" placeholder="https://example.com/screenshot.png">
        </div>
        <div class="form-group">
          <label class="form-label">Launch Date</label>
          <input type="date" id="f-launchDate" class="form-input">
        </div>
        <div class="form-group">
          <label class="form-label">Tagline</label>
          <input type="text" id="f-tagline" class="form-input" placeholder="一句话标语">
        </div>
        <div class="form-group">
          <label class="form-label">Slogan</label>
          <input type="text" id="f-slogan" class="form-input" placeholder="口号">
        </div>
        <div class="form-group">
          <label class="form-label">Use Case</label>
          <input type="text" id="f-useCase" class="form-input" placeholder="典型使用场景，如：内容创作、自动化运营">
        </div>
        <div class="form-group">
          <label class="form-label">Short Description</label>
          <textarea id="f-shortDescription" class="form-input form-textarea" rows="2" placeholder="简短描述（一两句话）"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Long Description</label>
          <textarea id="f-longDescription" class="form-input form-textarea" rows="4" placeholder="详细描述产品功能、特色等"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Categories</label>
          <div class="tag-input-wrap">
            <div id="tagList" class="tag-list"></div>
            <input type="text" id="tagInput" class="tag-input" placeholder="输入后按回车添加">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Price Model</label>
          <select id="f-priceModel" class="form-input form-select">
            <option value="">请选择</option>
            <option value="Free">Free</option>
            <option value="Freemium">Freemium</option>
            <option value="Paid">Paid</option>
            <option value="Subscription">Subscription</option>
            <option value="One-time">One-time</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Lowest Price</label>
          <input type="text" id="f-lowestPrice" class="form-input" placeholder="如：$0 / $9.99/月">
        </div>
      </div>
      <div class="form-footer">
        <button class="btn btn-primary" id="saveSiteBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          保存
        </button>
        <button class="btn btn-ghost" id="cancelFormBtn">取消</button>
      </div>
    </div>

    <!-- 网站管理 Tab -->
    <div class="tab-panel" id="tab-sites">
      <div class="panel-toolbar">
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" class="search-input" placeholder="搜索网站名称、地址...">
        </div>
        <button class="btn btn-primary btn-sm" id="addSiteBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          添加网站
        </button>
      </div>

      <div id="siteList" class="site-list"></div>
      <div id="siteEmpty" class="empty-state" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        <p>暂无网站，点击"添加网站"开始</p>
      </div>
    </div>

    <!-- 设置 Tab -->
    <div class="tab-panel" id="tab-settings">
      <div class="settings-section">
        <div class="settings-section-title">基本设置</div>

        <div class="setting-item">
          <div class="setting-info">
            <div class="setting-label">自动检测表单</div>
            <div class="setting-desc">页面加载时自动扫描可填表单</div>
          </div>
          <label class="toggle">
            <input type="checkbox" id="s-autoDetect">
            <span class="toggle-slider"></span>
          </label>
        </div>

        <div class="setting-item">
          <div class="setting-info">
            <div class="setting-label">显示手动按钮</div>
            <div class="setting-desc">在输入框旁显示快速填充按钮</div>
          </div>
          <label class="toggle">
            <input type="checkbox" id="s-showOverlay">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-section-title">AI 配置</div>
        <div class="setting-item setting-item-column">
          <div class="setting-label">DeepSeek API Key</div>
          <div class="setting-desc">用于智能识别无法匹配的表单字段</div>
          <div class="api-key-wrap">
            <input type="password" id="s-apiKey" class="form-input api-key-input" placeholder="sk-...">
            <button class="icon-btn" id="toggleApiKeyBtn" title="显示/隐藏">
              <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
      </div>

      <div class="settings-footer">
        <button class="btn btn-primary" id="saveSettingsBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          保存设置
        </button>
      </div>
    </div>
  </div>

  <script src="../utils/storage.js"></script>
  <script src="../utils/rules.js"></script>
  <script src="popup.js"></script>
</body>
</html>
